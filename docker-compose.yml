services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/artifacts/training/best_model.pth
      - SCALER_PATH=/app/artifacts/training/scaler.joblib
    volumes:
      - ./artifacts:/app/artifacts
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "80:80"
